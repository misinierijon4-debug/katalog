<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mustertafeln · Aufträge · engers</title>
<style>
:root{
  --bg:#f4f3f0; --card:#ffffff; --ink:#1c1c1e; --muted:#75757a;
  --line:#e4e2dd; --accent:#b02e2c; --accent-ink:#ffffff;
  --badge:#2d2d30; --chip:#eceae5; --chip-on:#1c1c1e;
  --shadow:0 1px 2px rgba(0,0,0,.05),0 6px 18px rgba(0,0,0,.06);
  --shadow-lg:0 8px 40px rgba(0,0,0,.22);
  --radius:14px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);
  font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
header{position:sticky;top:0;z-index:50;background:rgba(244,243,240,.88);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);padding:10px 16px 8px;}
.hrow{display:flex;align-items:center;gap:12px;max-width:1400px;margin:0 auto;flex-wrap:wrap}
.brand{font-family:Georgia,"Times New Roman",serif;font-size:24px;font-weight:700;letter-spacing:-.5px}
.brand small{font-family:inherit;color:var(--accent);font-size:24px}
.subtitle{color:var(--muted);font-size:12.5px;margin-top:-3px}
.searchwrap{flex:1;min-width:220px;position:relative}
.searchwrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted)}
#search{width:100%;padding:10px 36px 10px 36px;border:1px solid var(--line);border-radius:999px;
  font-size:15px;background:var(--card);outline:none;transition:border .15s, box-shadow .15s}
#search:focus{border-color:#b8b5ae;box-shadow:0 0 0 3px rgba(0,0,0,.05)}
#clearBtn{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:0;background:var(--chip);
  width:24px;height:24px;border-radius:50%;cursor:pointer;color:var(--muted);display:none;font-size:13px;line-height:1}
.count{font-size:13px;color:var(--muted);white-space:nowrap}
.count b{color:var(--ink)}
.controls{display:flex;gap:8px;align-items:center;max-width:1400px;margin:8px auto 0;flex-wrap:wrap}
select{padding:8px 30px 8px 12px;border:1px solid var(--line);border-radius:10px;background:var(--card) url("data:image/svg+xml;charset=utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2375757a' fill='none' stroke-width='1.5'/%3E%3C/svg%3E") no-repeat right 10px center;
  font-size:13.5px;color:var(--ink);appearance:none;-webkit-appearance:none;cursor:pointer}
.typchips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 13px;border-radius:999px;background:var(--chip);border:1px solid transparent;
  font-size:13px;cursor:pointer;user-select:none;transition:all .12s}
.chip.on{background:var(--badge);color:#fff}
main{max-width:1400px;margin:0 auto;padding:16px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);cursor:pointer;
  overflow:hidden;display:flex;flex-direction:column;transition:transform .15s, box-shadow .15s;
  border:1px solid rgba(0,0,0,.03)}
.card:hover{transform:translateY(-3px);box-shadow:0 4px 8px rgba(0,0,0,.06),0 14px 32px rgba(0,0,0,.12)}
.thumbbox{position:relative;aspect-ratio:1/1.12;background:#dedcd7;overflow:hidden}
.thumbbox img{width:100%;height:100%;object-fit:contain;display:block;background:#fff}
.noimg{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:12px}
.pagebadge{position:absolute;top:8px;right:8px;background:var(--badge);color:#fff;font-size:11.5px;
  font-weight:600;padding:4px 9px;border-radius:999px;letter-spacing:.2px;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.printbtn{position:absolute;bottom:8px;right:8px;border:0;background:rgba(255,255,255,.94);
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;line-height:1;
  box-shadow:0 1px 5px rgba(0,0,0,.3);transition:transform .12s}
.printbtn:hover{transform:scale(1.12)}
.mprint{display:flex;gap:8px;flex-wrap:wrap}
.mprint button{border:0;background:var(--badge);color:#fff;border-radius:999px;
  padding:8px 15px;font-size:13.5px;cursor:pointer;display:inline-flex;gap:7px;align-items:center}
.mprint button:hover{background:#000}
.gtbadge{position:absolute;top:8px;left:8px;background:var(--accent);color:#fff;font-size:10.5px;
  font-weight:700;padding:3px 8px;border-radius:999px}
.cbody{padding:10px 12px 12px;display:flex;flex-direction:column;gap:3px;flex:1}
.cserie{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:700}
.ccode{font-weight:700;font-size:14px;letter-spacing:.2px}
.csize{font-size:13px;color:var(--muted)}
.cart{font-size:12px;color:var(--muted);margin-top:auto;padding-top:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;color:var(--muted);padding:70px 20px;font-size:15px}
.empty b{display:block;font-size:38px;margin-bottom:10px}

/* ---------- modal ---------- */
#overlay{position:fixed;inset:0;background:rgba(20,20,22,.55);z-index:100;display:none;
  align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
#overlay.open{display:flex}
#modal{background:var(--card);border-radius:18px;max-width:960px;width:100%;max-height:94vh;max-height:94dvh;
  overflow:auto;box-shadow:var(--shadow-lg);position:relative;display:grid;grid-template-columns:1.15fr 1fr}
#mclose{position:absolute;top:10px;right:10px;z-index:5;border:0;background:rgba(255,255,255,.9);
  width:34px;height:34px;border-radius:50%;font-size:17px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.2)}
.mimgbox{position:relative;background:#efedea;min-height:320px;display:flex;align-items:center;justify-content:center}
.mimgbox img{width:100%;height:100%;object-fit:contain;max-height:94vh}
.navbtn{position:absolute;top:50%;transform:translateY(-50%);border:0;background:rgba(255,255,255,.92);
  width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.25)}
.navbtn.prev{left:10px}.navbtn.next{right:10px}
.imgdots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.imgdots span{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,.25)}
.imgdots span.on{background:var(--ink)}
.minfo{padding:22px 22px 26px;display:flex;flex-direction:column;gap:12px}
.minfo .cserie{font-size:12px}
.mcodes{font-family:Georgia,serif;font-size:22px;font-weight:700;line-height:1.25}
.mrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.tag{background:var(--chip);border-radius:8px;padding:5px 10px;font-size:13px}
.tag b{font-weight:700}
.tag.page{background:var(--badge);color:#fff}
.tag.gt{background:var(--accent);color:#fff;font-weight:700}
.sect{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
  font-weight:700;margin-top:6px;border-top:1px solid var(--line);padding-top:12px}
table.arts{width:100%;border-collapse:collapse;font-size:13.5px}
table.arts td{padding:6px 8px 6px 0;border-bottom:1px dashed var(--line);vertical-align:top}
table.arts tr:last-child td{border-bottom:0}
.artnr{font-weight:700;white-space:nowrap}
.mnotes{font-size:13px;color:var(--muted)}
.mlabel{font-size:13.5px}
.mlabel b{letter-spacing:.3px}
.warn{background:#fdf3e4;border:1px solid #f0d9ae;color:#8a5b12;border-radius:10px;
  padding:9px 12px;font-size:12.5px}
footer{max-width:1400px;margin:8px auto 30px;padding:0 16px;color:var(--muted);font-size:12px}

@media (max-width:720px){
  #grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  #modal{grid-template-columns:1fr;max-height:92dvh}
  .mimgbox{min-height:0;max-height:44dvh}
  .mimgbox img{max-height:44dvh}
  .minfo{padding:16px 16px 22px}
  .brand{font-size:20px}
  main{padding:10px}
}

/* ---------- Auftragsverwaltung ---------- */
#afBar{background:var(--card);border-bottom:1px solid var(--line);padding:8px 16px}
.af-hrow{max-width:1400px;margin:0 auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.af-btn{border:0;background:var(--badge);color:#fff;border-radius:999px;min-height:40px;
  padding:8px 16px;font-size:13.5px;cursor:pointer;display:inline-flex;gap:7px;align-items:center}
.af-btn:hover{background:#000}
.af-btn.sec{background:var(--chip);color:var(--ink)}
.af-btn.sec:hover{background:#dedcd5}
.af-btn.acc{background:var(--accent)}
.af-btn.acc:hover{background:#8f2422}
.af-toggle{font-weight:700;background:transparent;border:0;font-size:15px;cursor:pointer;
  min-height:40px;display:inline-flex;align-items:center;gap:8px;color:var(--ink)}
.af-count{background:var(--accent);color:#fff;border-radius:999px;font-size:12px;font-weight:700;padding:2px 9px}
#afList{max-width:1400px;margin:8px auto 4px;display:flex;flex-direction:column;gap:8px}
.af-row{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 12px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.af-row.done{opacity:.62}
.af-nr{font-weight:700;font-size:15px}
.af-meta{color:var(--muted);font-size:13px}
.af-prog{background:var(--chip);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:600}
.af-status{border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}
.af-status.offen{background:#fdf3e4;color:#8a5b12}
.af-status.erledigt{background:#e4f3e6;color:#1e6b2a}
.af-status.inArbeit{background:#e3edf8;color:#1f5088}
.af-status.verpackt{background:#efe6f7;color:#5b2d86}
.af-status.versendet{background:#e4f3e6;color:#1e6b2a}
#syncStatus{font-size:14px;line-height:1}
.af-rowbtns{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
.af-empty{color:var(--muted);font-size:13.5px;padding:6px 2px}
/* Hinweis-Balken aktiver Auftrag */
#afBanner{background:var(--badge);color:#fff;border-radius:var(--radius);padding:12px 16px;
  margin:0 0 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;box-shadow:var(--shadow)}
#afBanner b{font-size:16px}
#afBanner .af-prog{background:rgba(255,255,255,.16);color:#fff}
.af-unk{background:var(--accent);color:#fff;border-radius:999px;padding:6px 12px;font-size:12.5px;
  cursor:pointer;display:inline-flex;gap:6px;align-items:center;min-height:40px;border:0}
.af-unk.done{background:#5c5c60;text-decoration:line-through}
/* Karten-Dekoration */
.af-stk{position:absolute;top:8px;left:8px;background:var(--accent);color:#fff;font-size:12px;
  font-weight:700;padding:4px 9px;border-radius:999px;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.af-stk.shift{top:36px}
.af-chk{position:absolute;bottom:8px;left:8px;background:rgba(255,255,255,.94);border-radius:999px;
  padding:6px 12px;font-size:12.5px;font-weight:600;display:inline-flex;gap:6px;align-items:center;
  cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,.3);min-height:40px}
.af-chk input{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}
.card.af-done{opacity:.45}
.card.af-done .thumbbox img{filter:grayscale(.8)}
/* Overlays (Editor / Druckliste) */
.af-overlay{position:fixed;inset:0;background:rgba(20,20,22,.55);z-index:120;display:none;
  align-items:flex-start;justify-content:center;padding:18px;overflow:auto;
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.af-overlay.open{display:flex}
.af-dlg{background:var(--card);border-radius:18px;max-width:860px;width:100%;box-shadow:var(--shadow-lg);
  padding:20px;position:relative;margin:auto 0}
.af-dlg h2{margin:0 0 14px;font-family:Georgia,serif;font-size:21px}
.af-dlg .sect{margin-top:14px}
.af-x{position:absolute;top:10px;right:10px;border:0;background:var(--chip);width:40px;height:40px;
  border-radius:50%;font-size:16px;cursor:pointer}
.af-form{display:flex;gap:10px;flex-wrap:wrap}
.af-form label{display:flex;flex-direction:column;gap:4px;font-size:12.5px;color:var(--muted);flex:1;min-width:150px}
.af-form input{padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:15px;
  background:var(--bg);outline:none;min-height:40px}
.af-form input:focus{border-color:#b8b5ae}
table.af-pos{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px}
table.af-pos th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);padding:4px 6px 6px 0;border-bottom:1px solid var(--line)}
table.af-pos td{padding:7px 6px 7px 0;border-bottom:1px dashed var(--line);vertical-align:middle}
table.af-pos input{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;
  background:var(--bg);width:100%;min-height:40px}
table.af-pos input.stk{width:64px;text-align:center}
.af-ok{color:#1e6b2a;font-weight:600;white-space:nowrap}
.af-bad{color:var(--accent);font-weight:700;white-space:nowrap}
.af-del{border:0;background:var(--chip);border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:14px}
.af-del:hover{background:var(--accent);color:#fff}
/* Autocomplete */
.af-acwrap{position:relative;flex:1;min-width:220px}
.af-acwrap input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
  font-size:15px;background:var(--bg);outline:none;min-height:44px}
.af-aclist{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--line);
  border-radius:10px;box-shadow:var(--shadow-lg);z-index:10;max-height:280px;overflow:auto;display:none}
.af-aclist.open{display:block}
.af-aclist button{display:block;width:100%;text-align:left;border:0;background:transparent;cursor:pointer;
  padding:10px 12px;font-size:13.5px;border-bottom:1px dashed var(--line);min-height:40px}
.af-aclist button:hover,.af-aclist button.sel{background:var(--chip)}
.af-aclist .m{color:var(--muted);font-size:12px}
#afTa{width:100%;min-height:120px;border:1px solid var(--line);border-radius:10px;background:var(--bg);
  padding:10px 12px;font:13px/1.5 ui-monospace,Consolas,monospace;resize:vertical;outline:none}
.af-note{font-size:12.5px;color:var(--muted)}
.af-footbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;justify-content:flex-end}
/* Druckliste */
.af-plist{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.af-prow{display:flex;gap:10px;align-items:center;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:8px 12px}
.af-prow.done{opacity:.5}
/* OCR */
#afOcrZone{border:2px dashed var(--line);border-radius:12px;background:var(--bg);padding:16px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;transition:border-color .15s,background .15s}
#afOcrZone.drag{border-color:var(--accent);background:#fbeeee}
#afOcrProg{display:none;align-items:center;gap:10px;flex-wrap:wrap;margin-top:8px}
.af-pbar{flex:1;min-width:160px;height:10px;background:var(--chip);border-radius:999px;overflow:hidden}
.af-pbar i{display:block;height:100%;width:0;background:var(--accent);border-radius:999px;transition:width .2s}
#afOcrRaw{display:none;max-height:200px;overflow:auto;background:var(--bg);border:1px solid var(--line);
  border-radius:10px;padding:10px 12px;font:12px/1.5 ui-monospace,Consolas,monospace;white-space:pre-wrap;margin-top:8px}
.af-conf{display:inline-block;width:12px;height:12px;border-radius:50%;vertical-align:-1px;margin-right:5px}
.af-conf.g{background:#2e9e44}.af-conf.y{background:#e0a410}.af-conf.r{background:#c93434}
.af-sugg{border:1px dashed var(--accent);background:transparent;color:var(--accent);border-radius:999px;
  padding:5px 11px;font-size:12.5px;cursor:pointer;margin:2px 4px 0 0;min-height:36px}
.af-sugg:hover{background:var(--accent);color:#fff}
.af-fixnote{font-size:11.5px;color:var(--muted)}
/* Toast */
#afToast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--badge);color:#fff;
  border-radius:12px;padding:12px 18px;font-size:13.5px;z-index:300;box-shadow:var(--shadow-lg);
  display:none;max-width:90vw;text-align:center}
@media (max-width:720px){
  .af-dlg{padding:14px}
  .af-rowbtns{margin-left:0;width:100%}
  table.af-pos .hidem{display:none}
}

</style>
</head>
<body>

<div id="afBar">
  <div class="af-hrow">
    <button class="af-toggle" id="afToggle">▸ 📋 Aufträge <span class="af-count" id="afN">0</span></button>
    <span id="syncStatus" style="display:none;cursor:default"></span>
    <button class="af-btn sec" id="afExpAll" title="Alle Aufträge als JSON-Datei sichern">⬇ Export JSON</button>
    <span class="af-note">Anlage &amp; Import passieren in der <b>Lagerkarte</b> – diese Seite zeigt dieselben Aufträge (Legacy: eigene Neuanlage/Text-Import/OCR entfernt).</span>
  </div>
  <div id="afList" style="display:none"></div>
</div>

<header>
  <div class="hrow">
    <div>
      <div class="brand">engers <small>·</small> Mustertafeln <small>· Aufträge</small></div>
      <div class="subtitle" id="subtitle"></div>
    </div>
    <div class="searchwrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Suche: Serie, Artikelnr., Größe, Code, Seite …" autocomplete="off">
      <button id="clearBtn" title="Leeren">✕</button>
    </div>
    <div class="count" id="count"></div>
  </div>
  <div class="controls">
    <select id="serieSel"><option value="">Alle Serien</option></select>
    <select id="sortSel">
      <option value="seite">Sortierung: Seite</option>
      <option value="serie">Sortierung: Serie A–Z</option>
      <option value="groesse">Sortierung: Größe</option>
    </select>
    <div class="typchips" id="typChips"></div>
  </div>
</header>

<main><div id="afBanner" style="display:none"></div><div id="grid"></div><div class="empty" id="empty" style="display:none"><b>∅</b>Keine Tafeln gefunden.<br>Suche oder Filter anpassen.</div></main>
<footer id="foot"></footer>


<div class="af-overlay" id="afPrintOv">
  <div class="af-dlg" style="max-width:520px">
    <button class="af-x" data-close="afPrintOv">✕</button>
    <h2>Alle Seiten drucken</h2>
    <div class="af-note" id="afPrintInfo"></div>
    <div class="af-plist" id="afPrintList"></div>
    <div class="af-footbtns">
      <button class="af-btn" id="afPrintSeq">▶ Nacheinander drucken</button>
      <button class="af-btn sec" data-close="afPrintOv">Schließen</button>
    </div>
  </div>
</div>
<div id="afToast"></div>

<div id="overlay">
  <div id="modal">
    <button id="mclose" title="Schließen">✕</button>
    <div class="mimgbox" id="mimg"></div>
    <div class="minfo" id="minfo"></div>
  </div>
</div>

<script src="katalog.js"></script>
<script>
const DATA = window.KATALOG_DATA;
const COVERS = {"ironlux":"IRONLUX","glowline":"GLOWLINE","phoenix":"PHOENIX","terra":"TERRA","mineral-wall-gardener":"MINERAL WALL/GARDENER","gardener":"GARDENER","mineral-wall-brick-stick":"MINERAL WALL/BRICK STICK","independent":"INDEPENDENT","enjoy":"ENJOY","kavala":"KAVALA","step-up":"STEP UP","brick-stick":"BRICK STICK","eo":"EO","treasure":"TREASURE","best-choice":"BEST CHOICE","underground":"UNDERGROUND","spa-2-0":"SPA 2.0","panello":"PANELLO","color-it":"COLOR IT","carrara":"CARRARA","wood":"WOOD","urban-pulse":"URBAN PULSE"};

/* ---------- helpers ---------- */
const norm = s => (s||"").toString().toLowerCase()
  .replace(/\s*x\s*/g,"x").replace(/\s+/g," ").trim();
const el = (t,c,h) => {const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const esc = s => (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;");

/* search haystack per entry */
DATA.forEach(e=>{
  const parts=[e.serie,e.material,e.name,e.tafel_groesse,"seite "+e.seite,String(e.seite),...(e.codes||[]),e.label||""];

/* ---------- filtering ---------- */
function filtered(){
  let out=DATA.filter(e=>{
    if(serieF && e.serie!==serieF) return false;
    if(typF==="gt" && !e.gt) return false;
    if(typF==="display" && !e.display) return false;
    if(typF==="tafel" && (e.display)) return false;
    if(q && !q.split(" ").every(t=>e._hay.includes(t))) return false;
    return true;
  });
  if(sort==="seite") out.sort((a,b)=>a.seite-b.seite);
  if(sort==="serie") out.sort((a,b)=>(a.serie||"").localeCompare(b.serie||"","de")||a.seite-b.seite);
  if(sort==="groesse") out.sort((a,b)=>b._area-a._area||a.seite-b.seite);
  return out;
}

const codePages={};
DATA.forEach(e=>(e.codes||[]).forEach(c=>{(codePages[c]=codePages[c]||new Set()).add(e.seite);}));
function pagesOf(e){
  const s=new Set([e.seite]);
  (e.codes||[]).forEach(c=>(codePages[c]||[]).forEach(p=>s.add(p)));
  return [...s].sort((a,b)=>a-b);
}
function pdfUrl(pn){return "pages/seite-"+String(pn).padStart(3,"0")+".pdf";}
let printFrame=null, printTimer=null;
function printPage(pn){
  const url=pdfUrl(pn);
  /* Bei file:// blockiert Chrome/Edge den PDF-Viewer in iframes -
     contentWindow.print() würde die (leere) App-Seite drucken statt der PDF.
     Daher: PDF direkt im neuen Tab öffnen, dort druckt der Browser die Katalogseite. */
  if(location.protocol==="file:"){
    window.open(url,"_blank");
    return;
  }
  try{
    if(printFrame) printFrame.remove();
    printFrame=document.createElement("iframe");
    printFrame.style.cssText="position:fixed;right:0;bottom:0;width:1px;height:1px;border:0;visibility:hidden";
    let printed=false;
    printFrame.onload=()=>{
      try{
        printFrame.contentWindow.focus();
        printFrame.contentWindow.print();
        printed=true;
      }catch(err){ window.open(url,"_blank"); printed=true; }
    };
    document.body.appendChild(printFrame);
    printFrame.src=url;
    clearTimeout(printTimer);
    printTimer=setTimeout(()=>{ if(!printed) window.open(url,"_blank"); },2500);
  }catch(err){
    window.open(url,"_blank");
  }
}

/* ================== Aufträge (aus der Lagerkarte, via Supabase) ==================
   Diese Seite ist reine Katalog-/Druckansicht der Aufträge aus der Lagerkarte.
   Es wird EXAKT dieselbe Supabase-Struktur verwendet wie dort:
     Tabelle public.lager_state (key text primary key, data jsonb,
                                 updated_at timestamptz, device_id text)
     → Zeile key='auftraege' enthält das komplette Aufträge-Array
       im Lagerkarten-Format. KEINE SQL-Migration nötig.
   Konflikte: last-write-wins über updated_at (wie in der Lagerkarte).
   Offline: letzter Stand liegt im localStorage-Cache; lokale Änderungen
   (Pick-Haken, Status) werden bei Wiederverbindung nachgesynct. */

/* Supabase JS Client v2 laden (CDN mit Fallback) — ohne ihn läuft die
   Seite mit dem lokalen Cache weiter (gleiches Muster wie die Lagerkarte). */
(function(){
  const srcs=[
    "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js",
    "https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"
  ];
  let i=0;
  window.__sbLoadState="loading";
  (function next(){
    if(i>=srcs.length){window.__sbLoadState="failed";return;}
    const s=document.createElement("script");
    s.src=srcs[i++];
    s.onload=()=>{window.__sbLoadState="ok";};
    s.onerror=()=>{s.remove();next();};
    document.head.appendChild(s);
  })();
})();

/* Gleiche Werte wie in der Lagerkarte: */
const SUPABASE_URL="https://wegebtwwkwbndcnrfzdj.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_Vjjd_AzNdRnEzeRAYQzZNg_yY7pIqz8";
const SYNC_TABLE="lager_state";
const SYNC_REMOTE_KEY="auftraege";
const SYNC_PUSH_DELAY=2000;

/* Eigene lokale Schlüssel (bewusst NICHT die der Lagerkarte, damit sich die
   beiden Apps in Browsern mit gemeinsamem file://-localStorage nicht in die
   Sync-Metadaten pfuschen — geteilt wird nur der Supabase-Stand): */
const AF_CACHE_KEY="af_katalog_cache_v1";    // letzter bekannter Aufträge-Stand
const AF_META_KEY="af_katalog_sync_meta_v1"; // {ts,dirty}
const AF_DEVICE_KEY="af_katalog_device_id";
const AF_LEGACY_KEY="auftraege_v1";          // alte lokale Auftragsverwaltung
const AF_LEGACY_FLAG="auftraege_v1_migration"; // "done" | "declined"

const afById=Object.fromEntries(DATA.map(e=>[e.id,e]));
const afNormCode=s=>(s||"").toString().toUpperCase().replace(/[^A-Z0-9]/g,"");
const AF_CODEMAP={};
DATA.forEach(e=>(e.codes||[]).forEach(c=>{const k=afNormCode(c);(AF_CODEMAP[k]=AF_CODEMAP[k]||[]).push(e.id);}));
/* Lagerkarten-Codes sind am "-10" abgeschnitten (z.B. "9552-IR80-0C"),
   Katalog-Codes enthalten es ("9552-IR80-0C-10") → beide Formen matchen. */
function afMatch(code){
  const k=afNormCode(code);
  return AF_CODEMAP[k]||AF_CODEMAP[k+"10"]||[];
}

/* ---------- Sync-Kern (kompakter Spiegel der Lagerkarten-Logik, 1 Key) ---------- */
let syncClient=null,syncDeviceId=null,syncMeta={ts:0,dirty:false};
let syncLastPushed=null,syncPushTimer=null,syncApplying=false,syncPushing=0,syncLastOkTs=null,syncSubscribedOnce=false,syncFirstOk=false;

function afLoadCache(){
  try{const raw=localStorage.getItem(AF_CACHE_KEY);
    if(raw){const arr=JSON.parse(raw);if(Array.isArray(arr))auftraege=arr;}}catch(e){}
}
function afSaveCache(){try{localStorage.setItem(AF_CACHE_KEY,JSON.stringify(auftraege));}catch(e){}}
function syncLoadMeta(){try{const m=JSON.parse(localStorage.getItem(AF_META_KEY));if(m&&typeof m.ts==="number")syncMeta=m;}catch(e){}}
function syncSaveMeta(){try{localStorage.setItem(AF_META_KEY,JSON.stringify(syncMeta));}catch(e){}}
function syncGetDeviceId(){
  let id=null;
  try{id=localStorage.getItem(AF_DEVICE_KEY);}catch(e){}
  if(!id){id="dev-"+Math.random().toString(36).slice(2,10)+"-"+Date.now().toString(36);
    try{localStorage.setItem(AF_DEVICE_KEY,id);}catch(e){}}
  return id;
}
function setSyncStatus(state){
  const el=document.getElementById("syncStatus");
  if(!el)return;
  const map={
    ok:["🟢","Sync: synchron mit der Lagerkarte"],
    busy:["🔄","Sync: synchronisiert…"],
    offline:["⚪","Sync: offline — zuletzt geladener Stand, Änderungen werden nachgesynct"],
    error:["🔴","Sync: Fehler — Änderungen bleiben lokal gespeichert"]
  };
  const m=map[state]||map.offline;
  el.style.display="inline-block";
  el.textContent=m[0];
  el.title=m[1]+(syncLastOkTs?" · Letzter Sync: "+new Date(syncLastOkTs).toLocaleString("de-DE"):"");
}
function syncHandleNetError(err){
  setSyncStatus(navigator.onLine===false?"offline":"error");
  try{console.warn("Aufträge-Sync:",err&&(err.message||err));}catch(e){}
}
function syncMarkOk(){
  syncLastOkTs=Date.now();
  if(syncPushing<=0)setSyncStatus("ok");
  if(!syncFirstOk){syncFirstOk=true;afLegacyCheck();}
}
/* Jede lokale Änderung (Pick-Haken, Status) läuft hier durch. */
function afMarkDirty(){
  afSaveCache();
  if(syncApplying)return;
  const str=JSON.stringify(auftraege);
  if(str===syncLastPushed)return;
  syncMeta.ts=Date.now();syncMeta.dirty=true;syncSaveMeta();
  if(syncClient)syncQueuePush();
}
function syncQueuePush(){clearTimeout(syncPushTimer);syncPushTimer=setTimeout(syncPushNow,SYNC_PUSH_DELAY);}
function syncPushNow(){
  if(!syncClient)return;
  const str=JSON.stringify(auftraege);
  let payload;
  try{payload=JSON.parse(str);}catch(e){return;}
  syncPushing++;setSyncStatus("busy");
  syncClient.from(SYNC_TABLE)
    .upsert({key:SYNC_REMOTE_KEY,data:payload,device_id:syncDeviceId},{onConflict:"key"})
    .select("updated_at")
    .then(res=>{
      syncPushing--;
      if(res.error){syncHandleNetError(res.error);return;}
      syncLastPushed=str;
      syncMeta.dirty=false;
      const row=res.data&&res.data[0];
      if(row&&row.updated_at)syncMeta.ts=Date.parse(row.updated_at)||syncMeta.ts;
      syncSaveMeta();syncMarkOk();
    },err=>{syncPushing--;syncHandleNetError(err);});
}
function syncApplyRemote(remoteData,remoteTs){
  if(!Array.isArray(remoteData))return;
  syncApplying=true;
  try{
    auftraege=remoteData;
    afSaveCache();
    syncLastPushed=JSON.stringify(auftraege);
    syncMeta.ts=remoteTs||Date.now();syncMeta.dirty=false;syncSaveMeta();
    if(afActive){
      const cur=auftraege.find(o=>o.id===afActive.id);
      if(cur){afActive=cur;afActiveIds=new Set(cur.positionen.flatMap(p=>afMatch(p.code)));}
      else{afActive=null;afActiveIds=new Set();}
    }
    render();
  }finally{syncApplying=false;}
}
function syncHandleRealtime(payload){
  const row=payload&&payload.new;
  if(!row||row.key!==SYNC_REMOTE_KEY)return;
  if(row.device_id===syncDeviceId)return; // eigenes Echo
  syncApplyRemote(row.data,Date.parse(row.updated_at)||Date.now());
  syncMarkOk();
}
function syncPullAll(){
  if(!syncClient)return;
  setSyncStatus("busy");
  syncClient.from(SYNC_TABLE)
    .select("key,data,updated_at,device_id")
    .eq("key",SYNC_REMOTE_KEY)
    .then(res=>{
      if(res.error){syncHandleNetError(res.error);return;}
      const row=(res.data||[])[0];
      const remoteTs=row?(Date.parse(row.updated_at)||0):0;
      if(row&&remoteTs>syncMeta.ts){
        syncApplyRemote(row.data,remoteTs);
      }else if(syncMeta.dirty){
        syncQueuePush();
      }else{
        syncLastPushed=JSON.stringify(auftraege);
      }
      syncMarkOk();
    },err=>syncHandleNetError(err));
}
function syncSubscribe(){
  syncClient.channel("auftraege-katalog-sync")
    .on("postgres_changes",{event:"*",schema:"public",table:SYNC_TABLE,filter:"key=eq."+SYNC_REMOTE_KEY},syncHandleRealtime)
    .subscribe(status=>{
      if(status==="SUBSCRIBED"){
        if(syncSubscribedOnce)syncPullAll(); // nach Reconnect Verpasstes nachladen
        else syncSubscribedOnce=true;
      }else if(status==="CHANNEL_ERROR"||status==="TIMED_OUT"){
        setSyncStatus(navigator.onLine===false?"offline":"error");
      }
    });
}
window.addEventListener("online",()=>{if(syncClient)syncPullAll();});
window.addEventListener("offline",()=>{if(syncClient)setSyncStatus("offline");});

function startSyncClient(){
  try{
    syncDeviceId=syncGetDeviceId();
    syncClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    setSyncStatus(navigator.onLine===false?"offline":"busy");
    syncPullAll();
    syncSubscribe();
  }catch(e){
    syncClient=null;setSyncStatus("error");
    try{console.warn("Aufträge-Sync: Start fehlgeschlagen:",e);}catch(e2){}
  }
}
function initSync(){
  let waited=0;
  (function waitForLib(){
    if(window.supabase&&window.supabase.createClient){startSyncClient();return;}
    if(window.__sbLoadState==="failed"||waited>15000){setSyncStatus("offline");afLegacyCheck();return;}
    waited+=300;setTimeout(waitForLib,300);

}

/* ---------- Einmalige Migration alter localStorage-Aufträge ---------- */
function afLegacyCheck(){
  let flag=null,raw=null;
  try{flag=localStorage.getItem(AF_LEGACY_FLAG);raw=localStorage.getItem(AF_LEGACY_KEY);}catch(e){return;}
  if(flag||!raw)return;
  let alte=[];
  try{alte=JSON.parse(raw);}catch(e){return;}

  if(!confirm(alte.length+" alte Aufträge aus der bisherigen lokalen Verwaltung gefunden – nach Supabase übernehmen?\n\n(Die alten Daten bleiben in jedem Fall unverändert im Browser gespeichert.)")){
    try{localStorage.setItem(AF_LEGACY_FLAG,"declined");}catch(e){}
    afToast("Alte Aufträge nicht übernommen – sie bleiben lokal erhalten.");
    return;
  }
  const now=new Date().toISOString();
  let uebernommen=0,uebersprungen=0;
  alte.forEach(o=>{
    if(!o||!Array.isArray(o.positionen))return;
    const nr=String(o.auftragsnr||"");
    if(nr&&auftraege.some(x=>String(x.auftragsnummer||"")===nr)){uebersprungen++;return;}
    auftraege.push({
      id:o.id||("a"+Date.now().toString(36)+Math.random().toString(36).slice(2,6)),
      auftragsnummer:nr,
      datum:o.datum?o.datum+"T00:00:00.000Z":(o.angelegt||now),
      kunde:o.kunde||("Auftrag "+nr),
      warenempfaenger:"",ort:"",bestellnr:"",
      importiertAm:o.angelegt||now,
      geprueftAm:null,
      status:o.status==="erledigt"?"verpackt":"offen",
      verpacktAm:null,versendetAm:null,notiz:"",
      title:"Auftrag "+nr,savedAt:now,
      positionen:o.positionen.map((p,i)=>({
        pos:("000"+((i+1)*10)).slice(-4),
        code:String(p.code||""),termin:"",
        menge:String(p.stueck||1),einheit:"ST",
        gepickt:!!p.erledigt,gepicktAm:null,verfuegbar:null,
        notiz:p.notiz||""
      }))
    });
    uebernommen++;
  });
  try{localStorage.setItem(AF_LEGACY_FLAG,"done");}catch(e){}
  afMarkDirty();render();
  afToast(uebernommen+" Auftrag/Aufträge übernommen"+(uebersprungen?", "+uebersprungen+" übersprungen (Nummer existiert schon)":"")+".");
}

/* ---------- aktiver Auftrag: Filter- und Render-Hooks ---------- */
let afActive=null, afActiveIds=new Set();
const _afFiltered=filtered;
filtered=function(){let out=_afFiltered();if(afActive)out=out.filter(e=>afActiveIds.has(e.id));return out;};
const _afRender=render;
render=function(){_afRender();afDecorate();afBanner();afList();};

function afOpen(o){
  afActive=o;
  afActiveIds=new Set(o.positionen.flatMap(p=>afMatch(p.code)));
  sort="seite";document.getElementById("sortSel").value="seite";
  q="";document.getElementById("search").value="";document.getElementById("clearBtn").style.display="none";
  serieF="";serieSel.value="";
  typF="";[...chipsBox.children].forEach(x=>x.classList.toggle("on",x.dataset.v===""));
  render();window.scrollTo({top:0,behavior:"smooth"});
}
function afClose(){afActive=null;afActiveIds=new Set();render();}

/* Pick-Haken: schreibt auf DASSELBE Feld (positionen[].gepickt) wie der
   Pick-Toggle der Lagerkarte — der Sync verteilt es an alle Geräte. */
function afSetPicked(positionen,checked){
  const now=new Date().toISOString();
  positionen.forEach(p=>{p.gepickt=checked;p.gepicktAm=checked?now:null;});
  afMarkDirty();
  afSuggestVerpackt();
  render();
}
/* Unaufdringlicher Vorschlag, KEIN Automatismus: nur Toast-Hinweis; der
   eigentliche Button steht im Auftrags-Banner. */
function afSuggestVerpackt(){
  if(!afActive)return;
  const[d,t]=afProg(afActive);
  if(t>0&&d===t&&(afActive.status==="offen"||afActive.status==="inArbeit"))
    afToast("Alle Positionen erledigt – oben im Banner: „Auf Verpackt setzen?“");
}

function afDecorate(){
  if(!afActive)return;
  const list=filtered();
  [...grid.children].forEach((card,i)=>{
    const e=list[i];if(!e)return;
    const poss=afActive.positionen.filter(p=>afMatch(p.code).includes(e.id));
    if(!poss.length)return;
    const tb=card.querySelector(".thumbbox");
    const stk=poss.reduce((s,p)=>s+afStk(p),0);
    const sb=el("span","af-stk"+(tb.querySelector(".gtbadge")?" shift":""),stk+" Stk");
    tb.appendChild(sb);
    const done=poss.every(p=>p.gepickt);
    if(done)card.classList.add("af-done");
    const lab=el("label","af-chk");
    const cb=document.createElement("input");cb.type="checkbox";cb.checked=done;
    cb.onchange=()=>afSetPicked(poss,cb.checked);
    lab.appendChild(cb);lab.appendChild(document.createTextNode(" erledigt"));
    lab.onclick=ev=>ev.stopPropagation();
    tb.appendChild(lab);
    const notes=poss.map(p=>p.notiz||p.lagerNote).filter(Boolean);
    if(notes.length){const nb=card.querySelector(".cbody");
      nb.appendChild(el("div","csize","📝 "+esc(notes.join(" · "))));}
  });
}

function afBanner(){
  const b=document.getElementById("afBanner");
  if(!afActive){b.style.display="none";return;}
  const o=afActive,[d,t]=afProg(o);
  b.style.display="flex";b.innerHTML="";
  b.appendChild(el("b","",`Auftrag ${esc(afNr(o))}`));
  b.appendChild(el("span","",esc(o.kunde||"–")+" · "+afFmtDate(o.datum||o.importiertAm)));
  b.appendChild(el("span","af-status "+esc(o.status||"offen"),AF_STATUS[o.status]||o.status||"?"));
  b.appendChild(el("span","af-prog",`${t} Positionen · ${d}/${t} erledigt`));
  const unk=o.positionen.filter(p=>!afMatch(p.code).length);
  unk.forEach(p=>{
    const u=el("button","af-unk"+(p.gepickt?" done":""),
      "⚠ "+esc(p.code)+" ("+afStk(p)+" Stk) – nicht im Katalog");
    u.title="Klicken zum Abhaken";
    u.onclick=()=>afSetPicked([p],!p.gepickt);
    b.appendChild(u);
  });
  /* Vorschlag statt Automatismus: alle gepickt → Button anbieten. */
  if(t>0&&d===t&&(o.status==="offen"||o.status==="inArbeit")){
    const v=el("button","af-btn acc","📦 Auf Verpackt setzen?");
    v.onclick=()=>{
      o.status="verpackt";o.verpacktAm=new Date().toISOString();
      afMarkDirty();render();
      afToast(`Auftrag ${afNr(o)} auf „Verpackt“ gesetzt.`);
    };
    b.appendChild(v);
  }
  const pr=el("button","af-btn sec","🖨 Alle Seiten drucken");pr.onclick=afPrintAll;
  const cl=el("button","af-btn sec","✕ Auftrag schließen");cl.onclick=afClose;
  const sp=el("span","");sp.style.marginLeft="auto";
  b.appendChild(sp);b.appendChild(pr);b.appendChild(cl);
}

/* ---------- Auftragsliste (Leiste oben) ---------- */
let afBarOpen=false;
function afList(){
  document.getElementById("afN").textContent=auftraege.length;
  document.getElementById("afToggle").firstChild.textContent=(afBarOpen?"▾":"▸")+" 📋 Aufträge ";
  const box=document.getElementById("afList");
  box.style.display=afBarOpen?"flex":"none";
  if(!afBarOpen)return;
  box.innerHTML="";
  if(!auftraege.length){box.appendChild(el("div","af-empty","Noch keine Aufträge. Aufträge werden in der Lagerkarte importiert und erscheinen hier automatisch."));return;}
  [...auftraege].sort((a,b)=>(b.importiertAm||b.savedAt||"").localeCompare(a.importiertAm||a.savedAt||"")).forEach(o=>{
    const[d,t]=afProg(o);
    const st=AF_STATUS[o.status]?o.status:"offen";
    const r=el("div","af-row"+(st==="versendet"?" done":""));
    r.appendChild(el("span","af-nr",esc(afNr(o))));
    r.appendChild(el("span","af-meta",esc(o.kunde||"–")+" · "+afFmtDate(o.datum||o.importiertAm)));
    r.appendChild(el("span","af-prog",`${d}/${t} Tafeln`));
    r.appendChild(el("span","af-status "+st,AF_STATUS[st]));
    const btns=el("div","af-rowbtns");
    const mk=(lbl,cls,fn,title)=>{const x=el("button","af-btn "+cls,lbl);x.onclick=fn;if(title)x.title=title;btns.appendChild(x);};
    mk("Öffnen","",()=>{afOpen(o);});
    mk("⬇","sec",()=>afExportOne(o),"Diesen Auftrag als JSON exportieren");
    r.appendChild(btns);
    box.appendChild(r);
  });
}
document.getElementById("afToggle").onclick=()=>{afBarOpen=!afBarOpen;afList();};

/* ---------- Sammeldruck ---------- */
function afPrintAll(){
  if(!afActive)return;
  /* Minimal-Kopplung: erster Sammeldruck eines offenen Auftrags → In Arbeit. */
  if(afActive.status==="offen"){
    afActive.status="inArbeit";
    afMarkDirty();render();
    afToast(`Auftrag ${afNr(afActive)} auf „In Arbeit“ gesetzt.`);
  }
  const pages=[...new Set(afActive.positionen.flatMap(p=>afMatch(p.code).map(id=>afById[id].seite)))].sort((a,b)=>a-b);
  const info=document.getElementById("afPrintInfo");
  info.textContent=pages.length
    ?`${pages.length} Katalogseite(n) für Auftrag ${afNr(afActive)}. Einzeln drucken oder nacheinander (der Browser kann Mehrfach-Dialoge blockieren – dann bitte einzeln abhaken).`
    :"Keine Katalogseiten – der Auftrag enthält nur unbekannte Codes.";
  const listBox=document.getElementById("afPrintList");listBox.innerHTML="";
  pages.forEach(pn=>{
    const row=el("div","af-prow");
    const b=el("button","af-btn","🖨 Seite "+pn);
    b.onclick=()=>{printPage(pn);row.classList.add("done");};
    row.appendChild(b);
    row.appendChild(el("span","af-note",pdfUrl(pn)));
    listBox.appendChild(row);
  });
  const seq=document.getElementById("afPrintSeq");
  seq.style.display=pages.length?"":"none";
  seq.onclick=()=>{
    pages.forEach((pn,i)=>setTimeout(()=>{
      printPage(pn);
      const r=listBox.children[i];if(r)r.classList.add("done");
    },i*2200));
  };
  document.getElementById("afPrintOv").classList.add("open");
  document.body.style.overflow="hidden";
}

/* ---------- Export JSON (Sicherung; Import/Anlage nur noch in der Lagerkarte) ---------- */
function afDownload(obj,name){
  const blob=new Blob([JSON.stringify(obj,null,1)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);
}
function afExportOne(o){afDownload(o,`auftrag_${(afNr(o)||"x").replace(/[^\w.-]+/g,"_")}.json`);}
document.getElementById("afExpAll").onclick=()=>{
  if(!auftraege.length){afToast("Keine Aufträge zum Exportieren.");return;}
  afDownload(auftraege,`auftraege_${new Date().toISOString().slice(0,10)}.json`);
};

/* ---------- Overlays schließen ---------- */
document.querySelectorAll("[data-close]").forEach(b=>{
  b.onclick=()=>{document.getElementById(b.dataset.close).classList.remove("open");document.body.style.overflow="";};
});
document.querySelectorAll(".af-overlay").forEach(ov=>{
  ov.addEventListener("click",ev=>{if(ev.target===ov){ov.classList.remove("open");document.body.style.overflow="";}});
});
document.addEventListener("keydown",ev=>{
  if(ev.key!=="Escape")return;
  document.querySelectorAll(".af-overlay.open").forEach(ov=>{ov.classList.remove("open");document.body.style.overflow="";});
});

/* ---------- Start: Cache anzeigen, dann Supabase abgleichen ---------- */
afLoadCache();
syncLoadMeta();
render();
initSync();

</script>
